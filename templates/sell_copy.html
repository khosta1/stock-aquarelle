{% extends "base.html" %}
{% block title %}Vendre l'exemplaire n°{{ copy.edition_number }}{% endblock %}
{% block content %}
  <p><a href="{{ url_for('variant_detail', variant_id=copy.variant_id) }}">← Retour</a></p>

  <div class="page-head">
    <h1>Vendre l'exemplaire n°{{ copy.edition_number }}/{{ variant.edition_size }}</h1>
    <p class="muted">{{ variant.artwork_title }} — {{ variant.size }}</p>
  </div>

  <form method="post" class="form card">
    <label>
      Date de vente
      <input type="date" name="sold_date" value="{{ form.sold_date or today }}">
    </label>
    <label>
      Prix de vente
      <input type="number" name="sale_price" step="0.01" min="0"
             value="{{ form.sale_price or '%.2f'|format(variant.price) }}">
    </label>
    <label>
      Client
      <input type="text" name="customer" value="{{ form.customer or '' }}"
             placeholder="ex. Marie (facultatif)">
    </label>
    <label>
      Canal de vente
      <input type="text" name="channel" value="{{ form.channel or '' }}"
             placeholder="ex. Marché, Etsy (facultatif)">
    </label>
    <div class="form-actions">
      <button type="submit" class="btn">Marquer comme vendu</button>
      <a class="btn btn-ghost"
         href="{{ url_for('variant_detail', variant_id=copy.variant_id) }}">Annuler</a>
    </div>
  </form>
{% endblock %}
