{% extends "base.html" %}
{% block title %}Ajouter un format — {{ artwork.title }}{% endblock %}
{% block content %}
  <div class="page-head">
    <h1>Ajouter un format / une édition</h1>
    <p class="muted">pour « {{ artwork.title }} »</p>
  </div>

  <form method="post" class="form card">
    <label>
      Format *
      {% if formats %}
        <select name="size" required autofocus>
          <option value="">— choisir un format —</option>
          {% for f in formats %}
            <option value="{{ f.name }}" {{ 'selected' if form.size == f.name }}>
              {{ f.name }}{% if f.dimensions %} — {{ f.dimensions }}{% endif %}
            </option>
          {% endfor %}
        </select>
      {% else %}
        <span class="muted">Aucun format défini —
          <a href="{{ url_for('settings') }}">créez-en un dans Paramètres</a>.</span>
      {% endif %}
    </label>
    <label>
      Papier
      {% if papers %}
        <select name="paper">
          <option value="">— aucun —</option>
          {% for p in papers %}
            <option value="{{ p.name }}" {{ 'selected' if form.paper == p.name }}>{{ p.name }}</option>
          {% endfor %}
        </select>
      {% else %}
        <span class="muted">Aucun papier défini —
          <a href="{{ url_for('settings') }}">ajoutez-en dans Paramètres</a>.</span>
      {% endif %}
    </label>
    <label>
      Prix
      <input type="number" name="price" value="{{ form.price or '' }}"
             step="0.01" min="0" placeholder="ex. 45.00">
    </label>
    <label>
      Taille de l'édition * <span class="muted">(nombre maximal d'exemplaires)</span>
      <input type="number" name="edition_size" value="{{ form.edition_size or '' }}"
             min="1" placeholder="ex. 50" required>
    </label>
    <div class="form-actions">
      <button type="submit" class="btn">Enregistrer le format</button>
      <a class="btn btn-ghost"
         href="{{ url_for('artwork_detail', artwork_id=artwork.id) }}">Annuler</a>
    </div>
  </form>
{% endblock %}
